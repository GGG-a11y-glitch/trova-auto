<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Honor Park Finder Pro</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #121212; --accent: #3b82f6; --text: #fff; --dim: #888; --safe: #00e676; --glass: rgba(255,255,255,0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* MAPPA (Top 55%) */
        #map { flex: 1.3; width: 100%; position: relative; z-index: 1; }
        
        /* PANNELLO UI (Bottom 45%) */
        .ui-panel { 
            flex: 1; padding: 20px; background: #000; 
            border-top: 1px solid #222;
            border-top-left-radius: 35px; border-top-right-radius: 35px;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.8); z-index: 1001;
            display: flex; flex-direction: column; gap: 18px; overflow-y: auto;
        }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .section-title { font-size: 0.75rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 800; }

        /* Stato: Non Parcheggiato */
        #btn-park {
            background: var(--accent); color: #fff; border: none; padding: 20px; border-radius: 24px;
            font-size: 1.1rem; font-weight: 800; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); transition: 0.2s;
        }
        #btn-park:active { transform: scale(0.96); opacity: 0.9; }

        /* Suggestion Tiles */
        .suggestion-row { display: flex; gap: 12px; overflow-x: auto; padding: 5px 0 10px 0; scrollbar-width: none; }
        .suggestion-row::-webkit-scrollbar { display: none; }
        
        .s-tile { 
            flex: 0 0 150px; background: var(--card); border: 1px solid rgba(255,255,255,0.08); 
            padding: 16px; border-radius: 24px; cursor: pointer; position: relative;
        }
        .s-tile b { display: block; color: var(--text); font-size: 0.85rem; margin-bottom: 4px; }
        .s-tile .dist { display: inline-block; background: rgba(59, 130, 246, 0.15); color: var(--accent); padding: 2px 8px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; }
        .s-tile .info { font-size: 0.65rem; color: var(--dim); margin-top: 8px; display: block; }

        /* Card Parcheggio Salvato */
        #parked-card {
            background: var(--card); border: 1px solid #222; padding: 24px; border-radius: 30px;
            display: none; flex-direction: column; gap: 15px; border-left: 4px solid var(--safe);
        }
        .addr-text { font-size: 1.05rem; font-weight: 600; line-height: 1.4; color: var(--text); }
        .time-info { font-size: 0.75rem; color: var(--safe); font-weight: 600; text-transform: uppercase; }

        .btn-nav {
            background: #fff; color: #000; text-decoration: none; padding: 18px; border-radius: 20px;
            font-weight: 800; text-align: center; font-size: 1rem; display: block; margin-top: 5px;
        }
        .btn-reset { background: none; border: none; color: var(--dim); font-size: 0.75rem; text-decoration: underline; margin-top: 5px; width: 100%; text-align: center; }

        .loader { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); z-index: 5000; width: 0%; transition: width 0.4s; }
    </style>
</head>
<body>

    <div id="loader" class="loader"></div>
    <div id="map"></div>

    <div class="ui-panel">
        
        <!-- STATO: CERCA -->
        <div id="searching-ui">
            <button id="btn-park" style="width: 100%;">🅿️ Segna Parcheggio Qui</button>
            
            <div style="margin-top: 15px;">
                <div class="section-header">
                    <h2 class="section-title">Parcheggi Gratis Vicini</h2>
                </div>
                <div class="suggestion-row" id="suggestions">
                    <!-- Tiles popolate via JS -->
                    <div class="s-tile"><span style="color:var(--dim);font-size:0.7rem;">Ricerca GPS...</span></div>
                </div>
            </div>
        </div>

        <!-- STATO: SALVATO -->
        <div id="parked-card">
            <div class="time-info" id="parked-time">Parcheggiata alle --:--</div>
            <div class="addr-text" id="addr-text">In caricamento indirizzo...</div>
            <a href="#" id="nav-link" target="_blank" class="btn-nav">🚀 Portami all'auto</a>
            <button class="btn-reset" id="btn-reset">Ho ritrovato l'auto (Reset)</button>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, userPos, userMarker, carMarker;
        const ld = document.getElementById('loader');

        // Calcolo distanza Haversine (KM)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function init() {
            map = L.map('map', { zoomControl: false }).setView([45, 9], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            const saved = JSON.parse(localStorage.getItem('honor_park_v3'));
            if(saved) showParkedState(saved);

            navigator.geolocation.watchPosition(p => {
                userPos = { lat: p.coords.latitude, lon: p.coords.longitude };
                if(!userMarker) {
                    userMarker = L.circleMarker([userPos.lat, userPos.lon], {radius: 8, color: '#3b82f6', fillOpacity: 1, weight: 3}).addTo(map);
                    if(!saved) map.setView([userPos.lat, userPos.lon], 17);
                    getNearbyParking(userPos.lat, userPos.lon);
                } else {
                    userMarker.setLatLng([userPos.lat, userPos.lon]);
                }
            }, null, {enableHighAccuracy: true});
        }

        async function getNearbyParking(lat, lon) {
            try {
                const query = `[out:json];node["amenity"="parking"](around:1500,${lat},${lon});out 10;`;
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const data = await res.json();
                
                const container = document.getElementById('suggestions');
                container.innerHTML = '';

                data.elements.forEach(el => {
                    const dist = calculateDistance(lat, lon, el.lat, el.lon).toFixed(1);
                    const tile = document.createElement('div');
                    tile.className = 's-tile';
                    tile.onclick = () => window.open(`https://www.google.com/maps?q=${el.lat},${el.lon}`);
                    tile.innerHTML = `
                        <b>🅿️ Parcheggio</b>
                        <span class="dist">${dist} km</span>
                        <span class="info">Tocca per andare</span>
                    `;
                    container.appendChild(tile);
                });
            } catch(e) { console.log("Errore Overpass"); }
        }

        document.getElementById('btn-park').onclick = () => {
            if(!userPos) return alert("Attendi il GPS...");
            ld.style.width = '50%';
            
            const time = Date.now();
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userPos.lat}&lon=${userPos.lon}`)
                .then(r => r.json())
                .then(g => {
                    const addr = `${g.address.road || 'Via ignota'} ${g.address.house_number || ''}, ${g.address.city || ''}`;
                    const data = { lat: userPos.lat, lon: userPos.lon, time, addr };
                    localStorage.setItem('honor_park_v3', JSON.stringify(data));
                    showParkedState(data);
                    ld.style.width = '100%';
                    setTimeout(() => ld.style.width = '0%', 400);
                });
        };

        function showParkedState(data) {
            document.getElementById('searching-ui').style.display = 'none';
            document.getElementById('parked-card').style.display = 'flex';
            document.getElementById('addr-text').innerText = data.addr;
            document.getElementById('parked-time').innerText = `Parcheggiata alle ${new Date(data.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
            document.getElementById('nav-link').href = `https://www.google.com/maps/dir/?api=1&destination=${data.lat},${data.lon}&travelmode=walking`;

            if(carMarker) map.removeLayer(carMarker);
            carMarker = L.marker([data.lat, data.lon], {
                icon: L.divIcon({html: '🚗', className: '', iconSize:[40,40], iconAnchor:[20,20]})
            }).addTo(map);
            map.setView([data.lat, data.lon], 17);
        }

        document.getElementById('btn-reset').onclick = () => {
            if(confirm("Rimuovere il parcheggio salvato?")) {
                localStorage.removeItem('honor_park_v3');
                location.reload();
            }
        };

        window.onload = init;
    </script>
</body>
</html>
